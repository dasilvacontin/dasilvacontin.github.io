---
layout: default
---

<style>
html {
    scroll-behavior: smooth;
    scroll-padding-top: calc(var(--size--32) + 72px);
}

html, body {
    margin: 0;
    padding: 0;
}

body {
    position: relative;
}

:root {
    --home-max-width: 1480px;
    --home-margin-left: var(--size--32);
    --home-margin-right: var(--size--32);
}

.home-layout-rail {
    width: 100%;
    max-width: var(--home-max-width);
    margin-inline: auto;
    padding-inline: var(--home-margin-left) var(--home-margin-right);
    box-sizing: border-box;
}

.hero-context {
    list-style: none;
    padding: 0;
    margin: 0;
}

.home {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    column-gap: var(--size--32);
    row-gap: var(--size--48);
    padding-bottom: 50vh;
    align-items: start;
}

.dg {
    z-index: 1100 !important;
}

.home-header {
    position: fixed;
    top: var(--size--32);
    left: 0;
    right: 0;
    z-index: 100;
}

.home-header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
}


.home-content {
    grid-column: 1 / span 2;
    display: flex;
    flex-direction: column;
    gap: var(--size--48);
    min-width: 0;
}

.home-gallery {
    grid-column: 3 / -1;
    display: flex;
    flex-direction: column;
    gap: var(--size--32);
    margin-top: var(--home-gallery-margin-top, 116px);
    min-width: 0;
}

.home-gallery-image {
    display: block;
    width: 100%;
    height: auto;
}

.home-header-nav {
    display: flex;
    align-items: center;
    gap: var(--size--24);
    flex-wrap: wrap;
    justify-content: flex-end;
}

.home-header-nav a {
    color: var(--color--text-primary);
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
}

.home-header-nav a:hover {
    color: var(--color--accent);
}

.hero,
.profile-section {
    scroll-margin-top: calc(var(--size--32) + 72px);
}

.home-signature {
    display: block;
    line-height: 0;
    text-decoration: none;
    opacity: 1;
    transition: opacity 0.25s ease;
    pointer-events: auto;
}

.home-signature.is-hidden {
    opacity: 0;
    pointer-events: none;
}

.home-scroll-sentinel {
    position: absolute;
    top: 0;
    left: 0;
    width: 1px;
    height: 1px;
    pointer-events: none;
}

.home-signature img {
    display: block;
    width: 100px;
    height: auto;
}

.hero {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    text-align: left;
    gap: var(--size--16);
    min-height: 100dvh;
    padding: 0;
    box-sizing: border-box;
}

.hero .hero-title {
    margin: 0;
}

.hero .hero-title + .hero-title {
    font-size: var(--text--hero-title-font-size);
    font-weight: var(--text--hero-title-font-weight);
    line-height: var(--text--hero-title-line-height);
}

.quote-home-margins {
    margin: var(--size--64) 0;
}

.quote-block.quote-home-margins.quote-home-first {
    margin-top: -140px;
}

.sticky-note-anchor {
    position: absolute;
    top: var(--size--32);
    left: 0;
    right: 0;
    pointer-events: none;
    z-index: 1000;
}

.sticky-note-anchor .home-layout-rail {
    position: relative;
    pointer-events: none;
}

.sticky-note {
    position: absolute;
    top: 0;
    right: 0;
    left: auto;
    bottom: auto;
    display: block;
    width: 290px;
    height: auto;
    margin: 0;
    padding: 0;
    border: none;
    pointer-events: auto;
    cursor: grab;
    touch-action: none;
    -webkit-user-drag: none;
    user-select: none;
}

.sticky-note.is-dragging {
    cursor: grabbing;
    user-select: none;
}

@media (max-width: 729px) {
    :root {
        --home-margin-left: var(--size--16);
        --home-margin-right: var(--size--16);
    }
}

@media (max-width: 1299px) {
    .home {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    .home-content {
        grid-column: 1;
    }

    .home-gallery {
        grid-column: 2;
    }
}

@media (max-width: 1024px) {
    .home {
        grid-template-columns: 1fr;
    }

    .home-content,
    .home-gallery {
        grid-column: 1 / -1;
    }
}

</style>

<div id="home-scroll-sentinel" class="home-scroll-sentinel" aria-hidden="true"></div>
{% include home-header.html %}

<main class="home home-layout-rail">
    {% include home-content.html %}
</main>

<div class="sticky-note-anchor">
    <div class="home-layout-rail">
        <img
            id="sticky-note"
            class="sticky-note"
            src="{{ '/images/sticky-note.png' | prepend: site.baseurl }}"
            alt=""
            width="290"
            height="280"
            draggable="false"
        >
    </div>
</div>

<script src="{{ '/js/home-nav.js' | prepend: site.baseurl }}?v=2"></script>
<script src="{{ '/js/home-nav-contrast.js' | prepend: site.baseurl }}"></script>
<script src="{{ '/js/sticky-note.js' | prepend: site.baseurl }}?v=6" defer></script>
<script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
<script src="{{ '/js/home-gallery-gui.js' | prepend: site.baseurl }}"></script>
