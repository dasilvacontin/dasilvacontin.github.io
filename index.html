---
layout: default
---

<style>
html, body {
    margin: 0;
    padding: 0;
}

.hero-context {
    list-style: none;
    padding: 0;
    margin: 0;
}

.home {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    column-gap: var(--size--32);
    row-gap: var(--size--48);
    padding: 0 var(--size--32) 50vh;
    box-sizing: border-box;
    align-items: start;
}

.home-header {
    position: fixed;
    top: var(--size--32);
    left: var(--size--32);
    right: var(--size--32);
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
}


.home-content {
    grid-column: 1 / span 2;
    display: flex;
    flex-direction: column;
    gap: var(--size--48);
    min-width: 0;
}

.home-gallery {
    grid-column: 3 / -1;
    display: flex;
    flex-direction: column;
    gap: var(--size--32);
    margin-top: var(--home-gallery-margin-top, 116px);
    min-width: 0;
}

.home-gallery-image {
    display: block;
    width: 100%;
    height: auto;
}

.home-header-links {
    display: flex;
    gap: var(--size--16);
    list-style: none;
    margin: 0;
    padding: 0;
}

.home-header-links a {
    color: contrast-color(var(--color--background));
}

.home-header-links a:hover {
    color: var(--color--text-primary);
    color: contrast-color(var(--color--accent));
}

.home-signature {
    display: block;
    line-height: 0;
    text-decoration: none;
    opacity: 1;
    transition: opacity 0.25s ease;
    pointer-events: auto;
}

.home-signature.is-hidden {
    opacity: 0;
    pointer-events: none;
}

.home-scroll-sentinel {
    position: absolute;
    top: 0;
    left: 0;
    width: 1px;
    height: 1px;
    pointer-events: none;
}

.home-signature img {
    display: block;
    width: 95px;
    height: auto;
}

.hero {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    text-align: left;
    gap: var(--size--16);
    min-height: 100dvh;
    padding: 0;
    box-sizing: border-box;
}

.hero .hero-title {
    margin: 0;
}

.hero .hero-title + .hero-title {
    font-size: var(--text--hero-title-font-size);
    font-weight: var(--text--hero-title-font-weight);
    line-height: var(--text--hero-title-line-height);
}

.quote-home-margins {
    margin: var(--size--64) 0;
}

.quote-block.quote-home-margins.quote-home-first {
    margin-top: -140px;
}

.sticky-note {
    position: fixed;
    top: 0;
    left: 0;
    right: auto;
    bottom: auto;
    display: block;
    width: 290px;
    height: auto;
    margin: 0;
    padding: 0;
    border: none;
    z-index: 1000;
    cursor: grab;
    touch-action: none;
    -webkit-user-drag: none;
    user-select: none;
}

.sticky-note.is-dragging {
    cursor: grabbing;
    user-select: none;
}

@media (max-width: 1024px) {
    .home {
        grid-template-columns: 1fr;
    }

    .home-content,
    .home-gallery {
        grid-column: 1 / -1;
    }
}

</style>

<div id="home-scroll-sentinel" class="home-scroll-sentinel" aria-hidden="true"></div>
{% include home-header.html %}

<main class="home">
    {% include home-content.html %}
</main>

<img
    id="sticky-note"
    class="sticky-note"
    src="{{ '/images/sticky-note.png' | prepend: site.baseurl }}"
    alt=""
    width="290"
    height="280"
    draggable="false"
>

<script src="{{ '/js/home-nav.js' | prepend: site.baseurl }}?v=2"></script>
<script src="{{ '/js/sticky-note.js' | prepend: site.baseurl }}?v=3" defer></script>
<script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
<script src="{{ '/js/home-gallery-gui.js' | prepend: site.baseurl }}"></script>
