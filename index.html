---
layout: default
---

<style>
html, body {
    margin: 0;
    padding: 0;
}

.hero-context {
    list-style: none;
    padding: 0;
    margin: 0;
}

.home {
    display: flex;
    flex-direction: column;
    gap: var(--size--48);
    padding: var(--size--40);
    padding-bottom: 50vh;
    box-sizing: border-box;
    align-items: center;
}

.home > * {
    max-width: 580px;
    width: 100%;
    box-sizing: border-box;
}

.home-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
}

.home-header-links {
    display: flex;
    gap: var(--size--16);
    list-style: none;
    margin: 0;
    padding: 0;
}

.home-signature {
    display: block;
    line-height: 0;
    text-decoration: none;
}

.home-signature img {
    display: block;
    width: 95px;
    height: auto;
}

.hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: var(--size--16);
    padding: 80px 0;
}

.hero .hero-title {
    margin: 0;
}

.hero .hero-title + .hero-title {
    font-size: var(--text--hero-title-font-size);
    font-weight: var(--text--hero-title-font-weight);
    line-height: var(--text--hero-title-line-height);
}

.quote-home-margins {
    margin: var(--size--64) 0;
}

.home > .quote-block.quote-home-margins:first-of-type {
    margin-top: 0;
}

.sticky-note {
    position: fixed;
    display: block;
    width: 290px;
    height: auto;
    margin: 0;
    padding: 0;
    border: none;
    z-index: 1000;
    cursor: grab;
    touch-action: none;
    -webkit-user-drag: none;
    user-select: none;
}

.sticky-note.is-dragging {
    cursor: grabbing;
    user-select: none;
}

@media (max-width: 768px) {
    .home {
        padding-left: var(--size--16);
        padding-right: var(--size--16);
    }
}

</style>

<main class="home">
    {% include home-content.html %}
</main>

<img
    id="sticky-note"
    class="sticky-note"
    src="{{ '/images/sticky-note.png' | prepend: site.baseurl }}"
    alt=""
    width="290"
    height="280"
    draggable="false"
>

<script src="{{ '/js/sticky-note.js' | prepend: site.baseurl }}" defer></script>
